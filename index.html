<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Lar, Um Recomeço</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px 20px;
            text-align: center;
            margin-top: 20px;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .card-status {
            background: linear-gradient(135deg, #6c5ce7, #a861ff);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .card-status h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .card-status p {
            font-size: 14px;
            opacity: 0.9;
        }

        .btn {
            display: block;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            transition: background 0.3s ease;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.2);
        }

        .btn:active {
            background-color: #27ae60;
        }

        .btn-secondary {
            background-color: #3498db;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }

        .btn-secondary:active {
            background-color: #2980b9;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Um Lar, Um Recomeço</h1>
        <p class="subtitle">Acompanhe nossa jornada e colabore com a nossa conquista. Cada passo nos aproxima de um novo começo!</p>

        <div class="card-status">
            <h2>Ação Solidária Ativa</h2>
            <p>Clique abaixo para participar da nossa rifa especial.</p>
        </div>

        <a href="https://wa.me/5521999999999" class="btn" target="_blank">Adquirir Ponto na Rifa 🎟️</a>
        <a href="https://wa.me/5521999999999" class="btn btn-secondary" target="_blank">Falar no WhatsApp 💬</a>

        <footer>
             Criado com carinho • 2026
        </footer>
    </div>

</body>
</html>
